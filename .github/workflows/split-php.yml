name: Split PHP subtree

on:
  push:
    branches: [main]
    paths:
      - 'php/**'
      - '.github/workflows/split-php.yml'

jobs:
  split:
    name: Push php/ to elevenelo-php
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Subtree split and push
        env:
          PAT: ${{ secrets.SUBTREE_PAT }}
        run: |
          # Remove the default credential helper set by actions/checkout
          git config --unset-all http.https://github.com/.extraheader || true
          git subtree split --prefix=php -b php-split
          git remote add php-target https://x-access-token:${PAT}@github.com/Chafficui/elevenelo-php.git
          git push php-target php-split:main --force
